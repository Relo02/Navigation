# Local rolling 3D voxel map — parameters for local_voxel_map_node.
# Feeds the a_star_mpc planner's gaussian backend (obstacle PointCloud2).
# See docs/LOCAL_VOXEL_MAP.md for how the map is computed.

/**:
  ros__parameters:
    # ── inputs (DLIO, odom frame) ──────────────────────────────────────────
    cloud_topic: /dlio/odom_node/pointcloud/deskewed  # deskewed+registered scan (~10 Hz)
    odom_topic:  /dlio/odom_node/odom                  # robot pose used to centre the window

    # ── outputs ────────────────────────────────────────────────────────────
    # Point the planner's `obstacle_topic` at <node>/obstacles (default
    # /local_voxel_map/obstacles). ~ expands to the node-name namespace.
    obstacles_topic: "~/obstacles"     # PointCloud2 of ground-removed obstacle voxels -> planner
    voxel_topic:     "~/voxel_grid"    # PointCloud2 (same), for RViz / 3D queries
    costmap_topic:   "~/costmap"       # OccupancyGrid 2D column projection

    # ── rolling window / voxelisation ──────────────────────────────────────
    half_width:    8.0    # local map half-extent (m); total window = 2*half_width
    voxel_size:    0.10   # 3D voxel edge (m) — also the costmap resolution
    persistence_s: 3.0    # voxel memory before temporal decay (s); densifies sparse MID-360

    # ── ground removal (per-cell LOCAL-MINIMUM filter, on accumulated cloud) ──
    # See ground_segmentation.py. Each XY cell's local ground = the MINIMUM point
    # height (min-pooled over 3x3 so a cell holding only a tall obstacle is
    # compared against the surrounding floor). A point is ground if it rises
    # <= ground_band above that local minimum, an obstacle if ground_band..
    # max_height above it. Per-cell-relative -> robust to floor height, mild
    # tilt and the 0.10 m voxel quantization (this replaced an SVD plane-fit whose
    # planarity ratios were inflated by voxelization, keeping the whole floor).
    # ACTIVE knobs: ground_cell, ground_min_pts, ground_band, ground_leg_offset,
    # max_height, ground_min_total.
    ground_cell:          0.40   # XY tile size for the local-minimum (m)
    ground_min_pts:       4      # min points for a cell to define its ground; LOW so sparse far cells still
                                 # define (and remove) their floor instead of failing open (floor kept)
    ground_band:          0.14   # rise above local ground still counted as ground (m); >= voxel_size,
                                 # < smallest obstacle to keep. Widened to mop up mild floor unevenness/slope
    # The following are LEGACY SVD params — IGNORED by the local-minimum filter,
    # kept only so existing param files load cleanly. Safe to delete.
    ground_planarity_max: 0.85   # (unused)
    ground_flat_max:      0.15   # (unused)
    ground_slope_tol_deg: 30.0   # (unused)
    ground_step_tol:      0.10   # (unused)
    ground_seed_band:     0.15   # foot-height window for seed cells (m)
    ground_leg_offset:    1.0    # robot_z (sensor, odom) -> foot height drop (m); depends on sensor mount height
    ground_min_total:     200    # below this many accumulated points, pass the cloud through
    max_height:           2.0    # ignore points more than this above ground (m) — drops ceiling
    # The DLIO odom origin sits at the sensor (~1 m above the floor), so z_below
    # MUST reach BELOW the floor or ground segmentation has no ground reference
    # and the floor leaks through as obstacles.
    z_below:       1.5    # vertical crop below robot/sensor (m)
    z_above:       1.5    # vertical crop above robot/sensor (m)
    min_range:     0.4    # drop returns within this radius of the robot (self-hits) (m)

    # ── costmap encoding ───────────────────────────────────────────────────
    publish_costmap:    true
    costmap_unknown_as: -1   # value for non-occupied cells: -1 unknown, 0 free
